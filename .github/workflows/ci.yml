name: Trading System CI

on:
  push:
  pull_request:
    branches: [ main ]
         
jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    
    - run: export APP_ENV=prod
    - run: echo $APP_ENV
    - run: pip install -r requirements.txt    
    - run: PYTHONPATH=${{ github.workspace }} python tests2/test2_sell_pipeline.py -s -v
    #- run: pytest tests2/test2_sell_pipeline.py -s -v
    - run: pytest tests2/test2_market_analysis_pipeline.py -s -v
    - run: pytest tests2/test2_system_pipeline.py -s -v
  

