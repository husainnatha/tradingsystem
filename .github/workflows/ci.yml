name: Trading System CI

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/test_pipeline.py

      - run: python -m tests.test_tax_dashboard

      - run: python -m tests.test_disposal_ledger