name: CodeQL

on:

  pull_request:

    branches:
      - main
      - branches

jobs:

  analyse:

    runs-on: ubuntu-latest
  
    env: 
      
      APP_ENV: test

    permissions:

      actions: read

      contents: read

      security-events: write

    strategy:

      matrix:

        language:

          - python

    steps:

      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4