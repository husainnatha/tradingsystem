name: CodeQL

on:

  push:

    branches:
      - '**'

  pull_request:

    branches:
      - main

jobs:

  analyze:

    runs-on: ubuntu-latest

    permissions:

      actions: read

      contents: read

      security-events: write

    strategy:

      matrix:

        language:

          - python

    steps:

      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4